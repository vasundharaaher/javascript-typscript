<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chai aur code | DOM</title>
</head>
<body>
    <ul class="language">
        <li>
            Javascript
        </li>
    </ul>
</body>
<script>
    function addlanguage(language){
        const li = document.createElement("li")
        li.innerHTML = `${language}`
        document.querySelector('.language').appendChild(li)
    }
    addlanguage("Python")
    addlanguage("HTML")

    function addOptiLanguage(languagenm){
        const li = document.createElement('li')
        li.appendChild(document.createTextNode(languagenm))
        document.querySelector('.language').appendChild(li)
    }
    addOptiLanguage('goland')

    // Edit
    // first
    const secondLang = document.querySelector("li:nth-child(2)")
    console.log(secondLang);
    
    // secondLang.innerHTML = "MoNos"
    const newlang = document.createElement('li')
    newlang.textContent = "MoNogs"
    secondLang.replaceWith(newlang)

    // second
    const firstLang = document.querySelector('li:first-child')
    firstLang.outerHTML = '<li>Typscript</li>'


    // remove
    const lastLang = document.querySelector('li:last-child')
    lastLang.remove()
</script>
</html>
